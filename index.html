<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Carregando React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Carregando Babel (para ler o código React direto no navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Carregando Tailwind CSS para o visual -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Carregando FontAwesome para os ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Dados do Mapa Mental
        const mindMapData = {
          label: "MARCO LEGAL DO SUS",
          icon: "fa-balance-scale",

            {
              label: "4) Normas Operacionais Básicas (NOB)",
              icon: "fa-cog",
              style: "bg-purple-50 border-purple-400 text-purple-900 shadow-md text-base font-bold rounded-2xl",
              children: [
                {
                  label: "NOB 91",
                  style: "bg-purple-100 border-purple-400 font-semibold text-sm text-purple-900 rounded-2xl",
                  children: [
                    { label: "Início da descentralização", style: "bg-white border-purple-200 text-sm text-slate-600 rounded-xl" }
                  ]
                },
                {
                  label: "NOB 93",
                  style: "bg-purple-100 border-purple-400 font-semibold text-sm text-purple-900 rounded-2xl",
                  children: [
                    { label: "Fortalecimento da gestão municipal", style: "bg-white border-purple-200 text-sm text-slate-600 rounded-xl" }
                  ]
                },
                {
                  label: "NOB 96",
                  style: "bg-purple-100 border-purple-400 font-semibold text-sm text-purple-900 rounded-2xl",
                  children: [
                    { label: "Gestão plena municipal", style: "bg-white border-purple-200 text-sm text-slate-600 rounded-xl" },
                    { label: "Consolidação da descentralização", style: "bg-white border-purple-200 text-sm text-slate-600 rounded-xl" }
                  ]
                }
              ]
            },
            {
              label: "5) NOAS (Norma Operacional)",
              icon: "fa-network-wired",
              style: "bg-rose-50 border-rose-400 text-rose-900 shadow-md text-base font-bold rounded-2xl",
              children: [
                {
                  label: "NOAS 2001 e 2002",
                  style: "bg-rose-100 border-rose-400 font-semibold text-sm text-rose-900 rounded-2xl",
                  children: [
                    { label: "Ênfase na regionalização", style: "bg-white border-rose-200 text-sm text-slate-600 rounded-xl" },
                    { label: "Assistência por níveis de complexidade", style: "bg-white border-rose-200 text-sm text-slate-600 rounded-xl" }
                  ]
                }
              ]
            },
            {
              label: "6) Pacto pela Saúde (2006)",
              icon: "fa-handshake",
              style: "bg-teal-50 border-teal-400 text-teal-900 shadow-md text-base font-bold rounded-2xl",
              children: [
                {
                  label: "Pacto pela Vida",
                  icon: "fa-heart",
                  style: "bg-teal-100 border-teal-400 font-semibold text-sm text-teal-900 rounded-2xl",
                  children: [
                    { label: "Prioridades sanitárias", style: "bg-white border-teal-200 text-sm text-slate-600 rounded-xl" }
                  ]
                },
                {
                  label: "Pacto em Defesa do SUS",
                  icon: "fa-shield-alt",
                  style: "bg-teal-100 border-teal-400 font-semibold text-sm text-teal-900 rounded-2xl",
                  children: [
                    { label: "Valorização do SUS", style: "bg-white border-teal-200 text-sm text-slate-600 rounded-xl" }
                  ]

                  label: "Pacto de Gestão",
                  icon: "fa-cog",
                  style: "bg-teal-100 border-teal-400 font-semibold text-sm text-teal-900 rounded-2xl",

                    { label: "Responsabilidades (União, Estados, Municípios)", style: "bg-white border-teal-200 text-sm text-slate-600 rounded-xl" }

                }
              ]
            },
            {
              label: "7) Decreto nº 7.508/2011",
              icon: "fa-scroll",
              style: "bg-indigo-50 border-indigo-400 text-indigo-900 shadow-md text-base font-bold rounded-2xl",
              children: [
                { label: "Regulamenta a Lei 8.080", style: "bg-indigo-100 border-indigo-400 font-semibold text-sm text-indigo-900 rounded-2xl" },
                {
                  label: "Define:",
                  style: "bg-indigo-100 border-indigo-400 font-semibold text-sm text-indigo-900 rounded-2xl",
                  children: [
                    { label: "Região de Saúde", style: "bg-white border-indigo-200 text-sm text-slate-600 rounded-xl" },
                    { label: "Rede de Atenção à Saúde (RAS)", style: "bg-white border-indigo-200 text-sm text-slate-600 rounded-xl" },
                    { label: "Portas de entrada do SUS", style: "bg-white border-indigo-200 text-sm text-slate-600 rounded-xl" },
                    { label: "Mapa da Saúde", style: "bg-white border-indigo-200 text-sm text-slate-600 rounded-xl" }
                  ]
                },
                {
                  label: "Cria:",
                  style: "bg-indigo-100 border-indigo-400 font-semibold text-sm text-indigo-900 rounded-2xl",
                  children: [
                    { label: "COAP (Contrato Organizativo da Ação Pública)", style: "bg-white border-indigo-200 text-sm text-slate-600 rounded-xl" }
                  ]
                }
              ]
            },
            {
              label: "8) Financiamento do SUS",
              icon: "fa-dollar-sign",
              style: "bg-cyan-50 border-cyan-400 text-cyan-900 shadow-md text-base font-bold rounded-2xl",
              children: [
                {
                  label: "EC nº 29/2000",
                  style: "bg-cyan-100 border-cyan-400 font-semibold text-sm text-cyan-900 rounded-2xl",
                  children: [
                    { label: "Percentuais mínimos em saúde", style: "bg-white border-cyan-200 text-sm text-slate-600 rounded-xl" }
                  ]
                },
                {
                  label: "EC nº 86/2015",
                  style: "bg-cyan-100 border-cyan-400 font-semibold text-sm text-cyan-900 rounded-2xl",
                  children: [
                    { label: "Alteração no financiamento", style: "bg-white border-cyan-200 text-sm text-slate-600 rounded-xl" }
                  ]
                },
                {
                  label: "EC nº 95/2016",
                  style: "bg-cyan-100 border-cyan-400 font-semibold text-sm text-cyan-900 rounded-2xl",
                  children: [
                    { label: "Teto de gastos públicos", style: "bg-white border-cyan-200 text-sm text-slate-600 rounded-xl" }
                  ]
                }
              ]
            },
            {
              label: "9) Diretrizes estruturais",
              icon: "fa-layer-group",
              style: "bg-orange-50 border-orange-400 text-orange-900 shadow-md text-base font-bold rounded-2xl",
              children: [
                { label: "Descentralização", style: "bg-white border-orange-200 text-sm text-slate-600 rounded-xl" },
                { label: "Regionalização", style: "bg-white border-orange-200 text-sm text-slate-600 rounded-xl" },
                { label: "Hierarquização", style: "bg-white border-orange-200 text-sm text-slate-600 rounded-xl" }
              ]
            }
          ]
        };

        const TreeStyles = () => (
          <style>{`
            body { margin: 0; padding: 0; overflow: hidden; }
            .bg-dots {
              background-color: #f8fafc;
              background-image: radial-gradient(circle, #cbd5e1 1.5px, transparent 1.5px);
            }
            
            /* Animação Orgânica de Expansão */
            @keyframes growRight {
              from { opacity: 0; transform: translateX(-15px) scale(0.96); }
              to { opacity: 1; transform: translateX(0) scale(1); }
            }
            .animate-grow {
              animation: growRight 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
              transform-origin: left center;
            }

            /* Animação das Linhas SVG (stroke dinâmico) */
            .path-line {
              animation: drawLine 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            }
            @keyframes drawLine {
              to { stroke-dashoffset: 0; }
            }

            /* Sombras e transições mais suaves para os nós */
            .organic-node {
              box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
              transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .organic-node:hover {
              box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
              transform: translateY(-2px);
            }
          `}</style>
        );

        const getIconClass = (iconName, isMain) => {
          if (!iconName) return null;
          let baseClasses = isMain 
            ? "fas mr-3 text-2xl opacity-90" 
            : "fas mr-2 text-sm opacity-70";
          
          if (iconName === 'fa-balance-scale') return `${baseClasses} fa-balance-scale text-blue-300`;
          if (iconName === 'fa-check-circle') return `${baseClasses} fa-check-circle text-emerald-500`;
          if (iconName === 'fa-heartbeat') return `${baseClasses} fa-heartbeat text-emerald-600`;
          if (iconName === 'fa-landmark') return `${baseClasses} fa-landmark text-emerald-600`;
          if (iconName === 'fa-users') return `${baseClasses} fa-users text-blue-600`;
          if (iconName === 'fa-building') return `${baseClasses} fa-building text-blue-600`;
          if (iconName === 'fa-heart') return `${baseClasses} fa-heart text-teal-600`;
          
          return `${baseClasses} ${iconName}`;
        };

        const MindMapNode = ({ node, expandSignal, collapseSignal, navigateSignal, scale }) => {
          const isMainNode = node.label === "MARCO LEGAL DO SUS";
          const [isExpanded, setIsExpanded] = useState(isMainNode);
          const [highlight, setHighlight] = useState(false);
          const [lines, setLines] = useState([]);
          
          const wrapperRef = useRef(null);
          const parentBtnRef = useRef(null);
          const childrenContainerRef = useRef(null);
          const scaleRef = useRef(scale);
          
          const hasChildren = node.children && node.children.length > 0;

          // Manter o scaleRef atualizado sem disparar re-renders nas funções
          useEffect(() => {
            scaleRef.current = scale;
          }, [scale]);

          // Lógica de cálculo das curvas Bezier para desenhar as linhas (SVG)
          const calculateLines = useCallback(() => {
            if (!isExpanded || !wrapperRef.current || !parentBtnRef.current || !childrenContainerRef.current) {
              setLines([]);
              return;
            }

            const wrapperRect = wrapperRef.current.getBoundingClientRect();
            const parentRect = parentBtnRef.current.getBoundingClientRect();
            const currentScale = scaleRef.current || 1;

            const childNodes = Array.from(childrenContainerRef.current.children);
            
            const newLines = childNodes.map(childWrapper => {
              const childBtn = childWrapper.querySelector('.mindmap-btn');
              if (!childBtn) return null;

              const childRect = childBtn.getBoundingClientRect();

              // Calcula posições relativas anulando o efeito do scale da tela para obter os pixels CSS reais
              const startX = (parentRect.right - wrapperRect.left) / currentScale;
              const startY = (parentRect.top + parentRect.height / 2 - wrapperRect.top) / currentScale;

              const endX = (childRect.left - wrapperRect.left) / currentScale;
              const endY = (childRect.top + childRect.height / 2 - wrapperRect.top) / currentScale;

              // A intensidade da curva baseia-se na distância horizontal para gerar um aspecto fluido/orgânico
              const cpDistance = Math.max(30, (endX - startX) * 0.5);
              const cp1x = startX + cpDistance;
              const cp1y = startY;
              const cp2x = endX - cpDistance;
              const cp2y = endY;

              // Calcula a distância real para garantir que a linha inteira seja desenhada sem cortes
              const distance = Math.hypot(endX - startX, endY - startY);
              const pathLength = Math.max(100, distance * 1.5); // 1.5x compensa a curvatura de Bezier

              return {
                d: `M ${startX} ${startY} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${endX} ${endY}`,
                length: pathLength
              };
            }).filter(Boolean);

            setLines(newLines);
          }, [isExpanded]);

          // Atualiza as linhas sempre que o layout mudar usando ResizeObserver
          useEffect(() => {
            if (!wrapperRef.current || !isExpanded) return;
            
            const observer = new ResizeObserver(() => {
              calculateLines();
            });
            
            observer.observe(wrapperRef.current);
            if (childrenContainerRef.current) {
              observer.observe(childrenContainerRef.current);
            }
            
            return () => observer.disconnect();
          }, [isExpanded, calculateLines]);

          // Loop de animação: Sincroniza a curva da linha enquanto o nó se move/expande na tela (Animação CSS)
          useEffect(() => {
            if (!isExpanded) return;
            let frameId;
            const start = performance.now();
            
            const animateLines = (time) => {
              calculateLines();
              // Continua recalculando durante os primeiros 400ms (duração da animação growRight)
              if (time - start < 400) {
                frameId = requestAnimationFrame(animateLines);
              }
            };
            
            frameId = requestAnimationFrame(animateLines);
            return () => cancelAnimationFrame(frameId);
          }, [isExpanded, calculateLines]);

          // Expandir tudo
          useEffect(() => {
            if (expandSignal > 0 && hasChildren) setIsExpanded(true);
          }, [expandSignal, hasChildren]);

          // Recolher tudo
          useEffect(() => {
            if (collapseSignal > 0) setIsExpanded(isMainNode);
          }, [collapseSignal, isMainNode]);

          // Navegação
          useEffect(() => {
            if (navigateSignal && navigateSignal.count > 0) {
              if (isMainNode) {
                setIsExpanded(true);
              } else if (node.label === navigateSignal.target) {
                setIsExpanded(true);
                setTimeout(() => {
                  if (parentBtnRef.current) {
                    const rect = parentBtnRef.current.getBoundingClientRect();
                    window.dispatchEvent(new CustomEvent('centerNode', { detail: rect }));
                    setHighlight(true);
                    setTimeout(() => setHighlight(false), 2000);
                  }
                }, 100);
              } else {
                setIsExpanded(false);
              }
            }
          }, [navigateSignal, isMainNode, node.label]);

          const handleToggle = () => {
            if (hasChildren) setIsExpanded(!isExpanded);
          };

          return (
            <div ref={wrapperRef} className="relative flex flex-row items-center gap-10">
              {/* Linhas Conectoras SVG */}
              {isExpanded && hasChildren && (
                <svg 
                  className="absolute top-0 left-0 pointer-events-none z-0" 
                  style={{ width: '100%', height: '100%', overflow: 'visible' }}
                >
                  {lines.map((pathObj, index) => (
                    <path 
                      key={index} 
                      d={pathObj.d} 
                      fill="none" 
                      stroke="#94a3b8" /* slate-400 (levemente mais escuro para garantir clareza visual) */
                      strokeWidth="2.5" 
                      strokeLinecap="round"
                      className="path-line"
                      style={{
                        strokeDasharray: pathObj.length,
                        strokeDashoffset: pathObj.length
                      }}
                    />
                  ))}
                </svg>
              )}

              {/* Botão do Nó Pai */}
              <button 
                ref={parentBtnRef}
                onClick={handleToggle}
                className={`
                  mindmap-btn organic-node relative z-10 flex items-center px-5 py-3 border-2 text-left
                  max-w-[320px] leading-tight group pointer-events-auto
                  ${hasChildren ? 'cursor-pointer hover:border-slate-400' : 'cursor-default'}
                  ${node.style || 'bg-white border-slate-200 text-slate-700 rounded-xl'}
                  ${highlight ? 'ring-4 ring-yellow-400 ring-offset-2 scale-105 shadow-2xl z-50' : ''}
                `}
              >
                {node.icon && <i className={getIconClass(node.icon, isMainNode)}></i>}
                <span className="flex-1">{node.label}</span>
                
                {hasChildren && (
                  <div className={`ml-3 flex items-center justify-center w-6 h-6 rounded-full transition-colors duration-300 ${
                    isExpanded ? 'bg-slate-900/10 text-slate-700' : 'bg-blue-100 text-blue-600'
                  }`}>
                    <i className={`fas ${isExpanded ? 'fa-minus' : 'fa-plus'} text-[10px]`}></i>
                  </div>
                )}
              </button>

              {/* Contêiner de Nós Filhos */}
              {isExpanded && hasChildren && (
                <div ref={childrenContainerRef} className="flex flex-col gap-5 relative z-10 animate-grow py-2">
                  {node.children.map((child, index) => (
                    <div key={index} className="child-node-wrapper">
                      <MindMapNode 
                        node={child} 
                        expandSignal={expandSignal} 
                        collapseSignal={collapseSignal}
                        navigateSignal={navigateSignal}
                        scale={scale}
                      />
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        };

        const App = () => {
          const [expandSignal, setExpandSignal] = useState(0);
          const [collapseSignal, setCollapseSignal] = useState(0);
          const [navigateSignal, setNavigateSignal] = useState({ count: 0, target: null });

          const [scale, setScale] = useState(1);
          // Posição inicial centralizada à esquerda para o novo layout horizontal
          const [position, setPosition] = useState({ x: 100, y: window.innerHeight / 2 - 200 }); 
          const [isDragging, setIsDragging] = useState(false);
          const mainRef = useRef(null);

          const pointerCache = useRef(new Map());
          const pointerState = useRef({
            isDown: false,
            startX: 0,
            startY: 0,
            lastX: 0,
            lastY: 0,
            pointerId: null,
            isDragging: false,
            lastDistance: null
          });

          const handleNavigate = (targetLabel) => {
            setNavigateSignal(prev => ({ count: prev.count + 1, target: targetLabel }));
          };

          useEffect(() => {
            setPosition({ x: 80, y: window.innerHeight / 3 });
          }, []);

          useEffect(() => {
            const mainElement = mainRef.current;
            if (!mainElement) return;

            const preventScrollWhenDragging = (e) => {
              if (pointerState.current.isDragging || pointerCache.current.size >= 2) {
                e.preventDefault();
              }
            };
            mainElement.addEventListener('touchmove', preventScrollWhenDragging, { passive: false });

            const handleWheelEvent = (e) => {
              e.preventDefault(); 
              const zoomSensitivity = 0.002;
              const delta = -e.deltaY * zoomSensitivity;
              const scaleMultiplier = Math.exp(delta);
              
              setScale(prevScale => {
                 const newScale = Math.min(Math.max(0.1, prevScale * scaleMultiplier), 4); 
                 setPosition(prevPos => {
                    const rect = mainElement.getBoundingClientRect();
                    const cursorX = e.clientX - rect.left;
                    const cursorY = e.clientY - rect.top;
                    const pointX = (cursorX - prevPos.x) / prevScale;
                    const pointY = (cursorY - prevPos.y) / prevScale;
                    return { x: cursorX - pointX * newScale, y: cursorY - pointY * newScale };
                 });
                 return newScale;
              });
            };
            mainElement.addEventListener('wheel', handleWheelEvent, { passive: false });

            return () => {
               mainElement.removeEventListener('touchmove', preventScrollWhenDragging);
               mainElement.removeEventListener('wheel', handleWheelEvent);
            };
          }, []);

          useEffect(() => {
            const handleCenterNode = (e) => {
               if (!mainRef.current) return;
               const nodeRect = e.detail;
               const mainRect = mainRef.current.getBoundingClientRect();
               
               const screenCenterX = mainRect.left + mainRect.width / 2;
               const screenCenterY = mainRect.top + mainRect.height / 2;
               const nodeCenterX = nodeRect.left + nodeRect.width / 2;
               const nodeCenterY = nodeRect.top + nodeRect.height / 2;

               const dx = screenCenterX - nodeCenterX;
               const dy = screenCenterY - nodeCenterY;

               setPosition(prev => ({ x: prev.x + dx, y: prev.y + dy }));
            };
            window.addEventListener('centerNode', handleCenterNode);
            return () => window.removeEventListener('centerNode', handleCenterNode);
          }, []);

          const handlePointerDown = (e) => {
            pointerCache.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
            if (e.target.closest('button')) {
              pointerState.current.isDown = false;
              return; 
            }
            if (pointerCache.current.size === 1) {
                pointerState.current = {
                  ...pointerState.current, isDown: true, startX: e.clientX, startY: e.clientY,
                  lastX: e.clientX, lastY: e.clientY, pointerId: e.pointerId, isDragging: false, lastDistance: null
                };
                setIsDragging(false);
                if (mainRef.current) mainRef.current.setPointerCapture(e.pointerId);
            }
          };

          const handlePointerMove = (e) => {
            if (!pointerCache.current.has(e.pointerId)) return;
            pointerCache.current.set(e.pointerId, { x: e.clientX, y: e.clientY });

            if (pointerCache.current.size === 2) {
              pointerState.current.isDown = false;
              if (pointerState.current.isDragging) {
                  pointerState.current.isDragging = false;
                  setIsDragging(false);
              }
              const pointers = Array.from(pointerCache.current.values());
              const currentDistance = Math.hypot(pointers[1].x - pointers[0].x, pointers[1].y - pointers[0].y);

              if (pointerState.current.lastDistance) {
                const scaleMultiplier = currentDistance / pointerState.current.lastDistance;
                const centerX = (pointers[0].x + pointers[1].x) / 2;
                const centerY = (pointers[0].y + pointers[1].y) / 2;

                setScale(prevScale => {
                   const newScale = Math.min(Math.max(0.1, prevScale * scaleMultiplier), 4);
                   if (newScale === prevScale) return prevScale;
                   setPosition(prevPos => {
                      if (!mainRef.current) return prevPos;
                      const rect = mainRef.current.getBoundingClientRect();
                      const pointX = (centerX - rect.left - prevPos.x) / prevScale;
                      const pointY = (centerY - rect.top - prevPos.y) / prevScale;
                      return { x: centerX - rect.left - pointX * newScale, y: centerY - rect.top - pointY * newScale };
                   });
                   return newScale;
                });
              }
              pointerState.current.lastDistance = currentDistance;
            } else if (pointerCache.current.size === 1 && pointerState.current.isDown) {
              if (e.pointerId !== pointerState.current.pointerId) return;
              const dx = e.clientX - pointerState.current.startX;
              const dy = e.clientY - pointerState.current.startY;
              if (!pointerState.current.isDragging && Math.sqrt(dx * dx + dy * dy) > 5) {
                pointerState.current.isDragging = true;
                setIsDragging(true);
              }
              if (pointerState.current.isDragging) {
                const deltaX = e.clientX - pointerState.current.lastX;
                const deltaY = e.clientY - pointerState.current.lastY;
                setPosition(prev => ({ x: prev.x + deltaX, y: prev.y + deltaY }));
                pointerState.current.lastX = e.clientX;
                pointerState.current.lastY = e.clientY;
              }
            }
          };

          const handlePointerUp = (e) => {
            pointerCache.current.delete(e.pointerId);
            if (pointerCache.current.size < 2) pointerState.current.lastDistance = null;
            if (pointerCache.current.size === 0) {
              pointerState.current.isDown = false;
              pointerState.current.isDragging = false;
              pointerState.current.pointerId = null;
              setIsDragging(false);
            } else if (pointerCache.current.size === 1) {
               const remainingId = Array.from(pointerCache.current.keys())[0];
               const remainingPointer = pointerCache.current.get(remainingId);
               pointerState.current = {
                 ...pointerState.current, isDown: true, startX: remainingPointer.x, startY: remainingPointer.y,
                 lastX: remainingPointer.x, lastY: remainingPointer.y, pointerId: remainingId, isDragging: false
               };
               setIsDragging(false);
            }
            if (mainRef.current && mainRef.current.hasPointerCapture(e.pointerId)) mainRef.current.releasePointerCapture(e.pointerId);
          };

          return (
            <div className="w-full h-screen flex flex-col font-sans text-slate-800 bg-white">
              <TreeStyles />
              
              <header className="w-full p-6 bg-white/95 backdrop-blur-md border-b border-slate-200 shadow-sm z-20 shrink-0 select-none">
                <div className="max-w-7xl mx-auto flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                  <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center">
                      <i className="fas fa-heartbeat mr-3 text-blue-600 text-2xl"></i>
                      Mapa Mental: Marco Legal do SUS
                    </h1>
                    <p className="text-slate-500 mt-1 text-sm font-medium">
                      Faça <span className="font-bold">Zoom</span> e Arraste o fundo para <span className="font-bold">Navegar</span>.
                    </p>
                    <div className="flex gap-3 mt-4">
                      <button 
                        onClick={() => setExpandSignal(s => s + 1)} 
                        className="px-3 py-1.5 text-sm font-semibold bg-indigo-50 text-indigo-700 border border-indigo-200 rounded-lg hover:bg-indigo-100 transition-colors flex items-center shadow-sm"
                      >
                        <i className="fas fa-expand-arrows-alt mr-2"></i> Expandir tudo
                      </button>
                      <button 
                        onClick={() => setCollapseSignal(s => s + 1)} 
                        className="px-3 py-1.5 text-sm font-semibold bg-slate-50 text-slate-700 border border-slate-200 rounded-lg hover:bg-slate-100 transition-colors flex items-center shadow-sm"
                      >
                        <i className="fas fa-compress-arrows-alt mr-2"></i> Recolher tudo
                      </button>
                    </div>
                  </div>
                  <div className="hidden lg:flex flex-wrap justify-end gap-2 max-w-[50%]">
                     <button onClick={() => handleNavigate("1) Constituição Federal de 1988")} className="px-3 py-1 rounded-full bg-emerald-100 text-emerald-800 text-xs font-bold border border-emerald-200 shadow-sm hover:bg-emerald-200 hover:scale-105 transition-all cursor-pointer">CF/88</button>
                     <button onClick={() => handleNavigate("2) Leis Orgânicas da Saúde")} className="px-3 py-1 rounded-full bg-blue-100 text-blue-800 text-xs font-bold border border-blue-200 shadow-sm hover:bg-blue-200 hover:scale-105 transition-all cursor-pointer">Leis 8.080 / 8.142</button>
                     <button onClick={() => handleNavigate("3) Consolidação do SUS")} className="px-3 py-1 rounded-full bg-amber-100 text-amber-800 text-xs font-bold border border-amber-200 shadow-sm hover:bg-amber-200 hover:scale-105 transition-all cursor-pointer">Lei 8.689</button>
                     <button onClick={() => handleNavigate("4) Normas Operacionais Básicas (NOB)")} className="px-3 py-1 rounded-full bg-purple-100 text-purple-800 text-xs font-bold border border-purple-200 shadow-sm hover:bg-purple-200 hover:scale-105 transition-all cursor-pointer">NOB</button>
                     <button onClick={() => handleNavigate("5) NOAS (Norma Operacional)")} className="px-3 py-1 rounded-full bg-rose-100 text-rose-800 text-xs font-bold border border-rose-200 shadow-sm hover:bg-rose-200 hover:scale-105 transition-all cursor-pointer">NOAS</button>
                     <button onClick={() => handleNavigate("6) Pacto pela Saúde (2006)")} className="px-3 py-1 rounded-full bg-teal-100 text-teal-800 text-xs font-bold border border-teal-200 shadow-sm hover:bg-teal-200 hover:scale-105 transition-all cursor-pointer">Pacto</button>
                     <button onClick={() => handleNavigate("7) Decreto nº 7.508/2011")} className="px-3 py-1 rounded-full bg-indigo-100 text-indigo-800 text-xs font-bold border border-indigo-200 shadow-sm hover:bg-indigo-200 hover:scale-105 transition-all cursor-pointer">Dec. 7.508</button>
                     <button onClick={() => handleNavigate("8) Financiamento do SUS")} className="px-3 py-1 rounded-full bg-cyan-100 text-cyan-800 text-xs font-bold border border-cyan-200 shadow-sm hover:bg-cyan-200 hover:scale-105 transition-all cursor-pointer">Financiamento</button>
                     <button onClick={() => handleNavigate("9) Diretrizes estruturais")} className="px-3 py-1 rounded-full bg-orange-100 text-orange-800 text-xs font-bold border border-orange-200 shadow-sm hover:bg-orange-200 hover:scale-105 transition-all cursor-pointer">Diretrizes</button>
                  </div>
                </div>
              </header>

              <main 
                ref={mainRef}
                className={`flex-1 relative overflow-hidden bg-dots select-none transition-opacity duration-200 ${isDragging ? 'cursor-grabbing opacity-90 shadow-inner' : 'cursor-grab opacity-100'}`}
                style={{
                   backgroundPosition: `${position.x}px ${position.y}px`,
                   backgroundSize: `${24 * scale}px ${24 * scale}px`,
                   touchAction: 'pan-x pan-y'
                }}
                onPointerDown={handlePointerDown}
                onPointerMove={handlePointerMove}
                onPointerUp={handlePointerUp}
                onPointerCancel={handlePointerUp}
                onPointerOut={handlePointerUp}
              >
                <div 
                  className="absolute top-0 left-0 w-max transform-gpu pointer-events-none"
                  style={{ 
                    transform: `translate(${position.x}px, ${position.y}px) scale(${scale})`,
                    transformOrigin: '0 0',
                    transition: isDragging ? 'none' : 'transform 0.1s ease-out'
                  }}
                >
                  <MindMapNode 
                    node={mindMapData} 
                    expandSignal={expandSignal} 
                    collapseSignal={collapseSignal}
                    navigateSignal={navigateSignal}
                    scale={scale}
                  />
                </div>
              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
